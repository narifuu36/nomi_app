<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トップ画面 - 飲み会調整ツール</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="header">
    <div class="header-logo">
        <span class="beer-icon">🍻</span>
        <span class="header-title">飲み会調整ツール</span>
    </div>

    <div class="header-user">
        <span class="user-icon">👤</span>

        <!-- Flaskのsession対応 -->
        <span class="user-name">
            {{ username if username else "ゲスト" }}
        </span>

        <span class="dropdown-arrow">▼</span>
    </div>
</header>


<main class="main-content">

<section class="empty-state-card">

    <div class="empty-state-icon">🍻</div>

    <h1 class="empty-state-title">
        現在、アクティブな<br>
        <span class="highlight-text">飲み会イベント</span>はありません
    </h1>

    <p class="empty-state-description">
        みんなで飲みたい気分？<br>
        「飲みたい！」ボタンを押して、飲み会を始めよう！
    </p>

    <!-- Flaskルーティング対応 -->
    <a href="{{ url_for('event') }}" class="btn-primary-large">
        <span class="btn-icon">🍺</span>
        飲みたい！
    </a>

    <div class="usage-guide-card">
        <div class="usage-guide-header">
            <span class="guide-icon">💡</span>
            <h3 class="guide-title">使い方</h3>
        </div>

        <p class="guide-text">
            「飲みたい！」を押すと、飲み会イベントが作成され、<br>
            みんなが参加できるようになります。
        </p>
    </div>

</section>

</main>


<footer class="footer">
    <p class="copyright">© 2024 Nomikai Adjustment Tool</p>

    <nav class="footer-nav">
        <a href="#">使い方ガイド</a>
        <a href="#">お問い合わせ</a>
        <a href="#">プライバシーポリシー</a>
    </nav>
</footer>

</body>
</html>

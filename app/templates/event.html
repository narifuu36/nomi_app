<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ event.title }}</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <main class="main-content">

        <section class="form-section">

            <h1>
                {{ event.title }}
            </h1>

        </section>

        <form method="POST" action="/event">

            <!-- 参加可否 -->
            <section class="form-section">

                <h2>参加可否</h2>

                <div class="participation-buttons">

                    <button
                        type="button"
                        class="btn-participate active"
                        id="joinBtn">

                        参加する

                    </button>

                    <button
                        type="button"
                        class="btn-participate"
                        id="notJoinBtn">

                        参加しない

                    </button>

                </div>

                <input
                    type="hidden"
                    name="will_join"
                    id="will_join"
                    value="1">

            </section>


            <!-- 場所 -->
            <section class="form-section">

                <h2>場所（複数選択）</h2>

                <div class="location-options">

                    {% for place in places %}

                    <label class="checkbox-option">

                        <input
                            type="checkbox"
                            name="place"
                            value="{{ place }}">

                        <span>
                            {{ place }}
                        </span>

                    </label>

                    {% endfor %}

                </div>

            </section>


            <!-- 日程 -->
            <section class="form-section">

                <h2>日程（複数選択）</h2>

                <div class="date-options">

                    {% for date in dates %}

                    <label class="date-option">

                        <input
                            type="checkbox"
                            name="date"
                            value="{{ date }}">

                        <span class="date-box">
                            {{ date }}
                        </span>

                    </label>

                    {% endfor %}

                </div>

            </section>


            <!-- 時間 -->
            <section class="form-section">

                <h2>時間（複数選択）</h2>

                <div class="date-options">

                    {% for time in times %}

                    <label class="date-option">

                        <input
                            type="checkbox"
                            name="time_slot"
                            value="{{ time }}">

                        <span class="date-box">
                            {{ time }}
                        </span>

                    </label>

                    {% endfor %}

                </div>

            </section>


            <!-- 送信 -->
            <section class="form-section">

                <button
                    type="submit"
                    class="btn-submit">

                    投票する

                </button>

            </section>

        </form>

    </main>


    <script>

        /* =========================
           参加可否
        ========================= */

        const joinBtn =
            document.getElementById(
                "joinBtn"
            );

        const notJoinBtn =
            document.getElementById(
                "notJoinBtn"
            );

        const willJoinInput =
            document.getElementById(
                "will_join"
            );

        joinBtn.addEventListener(
            "click",
            () => {

                joinBtn.classList.add(
                    "active"
                );

                notJoinBtn.classList.remove(
                    "active"
                );

                willJoinInput.value = 1;

            }
        );

        notJoinBtn.addEventListener(
            "click",
            () => {

                notJoinBtn.classList.add(
                    "active"
                );

                joinBtn.classList.remove(
                    "active"
                );

                willJoinInput.value = 0;

            }
        );


        /* =========================
           日付・時間選択装飾
        ========================= */

        document
            .querySelectorAll(
                ".date-option input"
            )
            .forEach(
                input => {

                    input.addEventListener(
                        "change",
                        () => {

                            input.parentElement
                                .classList.toggle(
                                    "selected",
                                    input.checked
                                );

                        }
                    );

                }
            );


        /* =========================
           バリデーション
        ========================= */

        document
            .querySelector("form")
            .addEventListener(
                "submit",
                (e) => {

                    const places =
                        document.querySelectorAll(
                            'input[name="place"]:checked'
                        );

                    const dates =
                        document.querySelectorAll(
                            'input[name="date"]:checked'
                        );

                    const times =
                        document.querySelectorAll(
                            'input[name="time_slot"]:checked'
                        );

                    if (
                        places.length === 0
                    ) {

                        e.preventDefault();

                        alert(
                            "場所を選択してください"
                        );

                        return;

                    }

                    if (
                        dates.length === 0
                    ) {

                        e.preventDefault();

                        alert(
                            "日程を選択してください"
                        );

                        return;

                    }

                    if (
                        times.length === 0
                    ) {

                        e.preventDefault();

                        alert(
                            "時間を選択してください"
                        );

                        return;

                    }

                }
            );

    </script>

</body>

</html>

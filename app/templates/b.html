{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>現在募集中の飲み会</h2>
    <p>残り時間: <span id="timer"></span></p>
</div>

<form method="POST">

<div class="card">
    <h3>参加可否</h3>

    <div class="toggle">
        <button type="button" onclick="selectJoin(true)" id="joinBtn">参加する</button>
        <button type="button" onclick="selectJoin(false)" id="noJoinBtn">参加しない</button>
    </div>

    <input type="hidden" name="will_join" id="will_join">

</div>

<div id="formArea" style="display:none;">

<div class="card">
    <h3>場所</h3>
    <div class="option-group">
        <div class="option" onclick="selectOption(this, 'place', '新宿')">新宿</div>
        <div class="option" onclick="selectOption(this, 'place', '渋谷')">渋谷</div>
        <div class="option" onclick="selectOption(this, 'place', '池袋')">池袋</div>
    </div>
    <input type="hidden" name="place">
</div>

<div class="card">
    <h3>日程</h3>
    <input type="date" name="date">
</div>

<div class="card">
    <h3>時間帯</h3>
    <select name="time_slot">
        <option>18:00-20:00</option>
        <option>19:00-21:00</option>
        <option>20:00-22:00</option>
    </select>
</div>

</div>

<div style="text-align:center;">
    <button class="btn-main">投票する</button>
</div>

</form>

{% if is_host %}
<form method="POST" action="/finish">
    <button style="background:red;color:white;">締め切り</button>
</form>
{% endif %}

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

{% endblock %}

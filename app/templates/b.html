{% extends "base.html" %}
{% block content %}

<h2>参加可否</h2>

<form method="POST">

<label>
    <input type="radio" name="will_join" value="1" onclick="toggleForm(true)" required> 参加する
</label>
<label>
    <input type="radio" name="will_join" value="0" onclick="toggleForm(false)"> 参加しない
</label>

<div id="formArea" class="hidden">

    <!-- 場所 -->
    <h3>場所</h3>
    <label><input type="radio" name="place" value="名古屋"> 名古屋</label>
    <label><input type="radio" name="place" value="栄"> 栄</label>
    <label><input type="radio" name="place" value="金山"> 金山</label>

    <br><br>
    <input type="text" name="place_free" placeholder="その他の場所">

    <!-- 日程（複数選択） -->
    <h3>日程（複数選択可）</h3>

    {% for d in date_list %}
    <label style="margin-right:10px;">
        <input type="checkbox" name="dates" value="{{ d }}">
        {{ d }}
    </label>
    {% endfor %}

    <!-- 時間帯 -->
    <h3>時間帯</h3>
    <select name="time_slot">
        <option value="18:00-20:00">18:00-20:00</option>
        <option value="19:00-21:00">19:00-21:00</option>
        <option value="20:00-22:00">20:00-22:00</option>
    </select>

</div>

<br>
<button class="btn">送信</button>
</form>

{% if is_host %}
<form method="POST" action="/finish">
    <button style="background:red;color:white;">完了</button>
</form>
{% endif %}

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

{% endblock %}

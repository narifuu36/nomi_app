<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - 飲み会調整ツール</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="auth-body">

<header class="header">

    <div class="header-logo">
        <span class="beer-icon">🍻</span>
        <span class="header-title">飲み会調整ツール</span>
    </div>

    <a href="/" class="back-link-top">
        トップに戻る
    </a>

</header>

<main class="main-content center-content">

    <div class="auth-card">

        <div class="auth-icon">🍻</div>

        <h1 class="auth-title">
            ログイン
        </h1>

        {% if registered %}
        <div class="success-notice">
            ✅ 新規登録が完了しました。ログインしてください。
        </div>
        {% endif %}

        {% if error %}
        <div class="error-notice">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <p class="auth-desc">
            アカウントにログインして<br>
            飲み会を調整しましょう！
        </p>

        <form action="/login" method="POST">

            <div class="form-group">

                <label class="form-label">
                    ユーザー名
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-input"
                    placeholder="ユーザー名を入力"
                    required
                >

            </div>

            <div class="form-group">

                <label class="form-label">
                    パスワード
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-input"
                    placeholder="パスワードを入力"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn-submit orange-btn"
            >
                <i class="fas fa-right-to-bracket"></i>
                ログイン
            </button>

        </form>

        <div class="auth-switch">

            アカウントをお持ちでない方は<br>

            <a href="/signup">
                新規登録はこちら →
            </a>

        </div>

    </div>

</main>

<footer class="footer">
    <p class="copyright">
        © 2024 Nomikai Adjustment Tool
    </p>
</footer>

</body>
</html>
